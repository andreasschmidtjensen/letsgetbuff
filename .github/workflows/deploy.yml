name: Build and Deploy

# On every push to main: build the Docker image on GitHub's runners,
# push it to GitHub Container Registry (GHCR), then tell the VPS to pull & restart.
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # -> ghcr.io/andreasschmidtjensen/letsgetbuff  (lowercased automatically)
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # allows pushing the image to GHCR with the built-in token
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # provided automatically, no setup needed

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build              # only deploy after the image is built & pushed
    runs-on: ubuntu-latest
    steps:
      - name: Pull & restart on the VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # port: ${{ secrets.VPS_PORT }}   # uncomment if SSH isn't on 22
          script: |
            set -e
            cd ${{ secrets.VPS_APP_DIR }}
            echo "Syncing compose file..."
            git pull origin main
            echo "Pulling new image..."
            docker compose pull
            echo "Restarting..."
            docker compose up -d
            docker image prune -f
            echo "Deploy finished."
